<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagine — AI Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      filter: brightness(1.1);
      height: 100%;
      font-family: 'Inter', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('q.jpg') center/cover no-repeat;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 12px 32px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: #fff;
    }

    .logo-shape {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #f97316 0%, #ec4899 40%, #8b5cf6 80%, #06b6d4 100%);
      clip-path: polygon(50% 0%, 85% 15%, 100% 50%, 85% 85%, 50% 100%, 15% 85%, 0% 50%, 15% 15%);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .nav-links a:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-login {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.28);
      color: #fff;
      padding: 5px 14px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-login:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.45);
    }

    .btn-started {
      background: #fff;
      color: #111;
      border: none;
      padding: 5px 14px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-started:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ─── USER INFO IN NAV ─── */
    .user-info {
      display: none;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f97316, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-email {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.75);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-signout {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .btn-signout:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-color: rgba(255,255,255,0.35);
    }

    /* ─── AUTH MODAL ─── */
    .auth-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.55);
      align-items: center;
      justify-content: center;
    }

    .auth-overlay.open {
      display: flex;
    }

    .auth-modal {
      background: #18181b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 320px;
      position: relative;
    }

    .auth-modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.15s;
    }

    .auth-modal-close:hover { color: #fff; }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 20px;
    }

    .auth-logo .logo-shape { width: 18px; height: 18px; }

    .auth-logo span {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .auth-heading {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .auth-sub {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 20px;
    }

    .auth-btn-google {
      width: 100%;
      background: #fff;
      color: #111;
      border: none;
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .auth-btn-google:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .auth-error {
      font-size: 0.75rem;
      color: #f87171;
      margin-top: 10px;
      text-align: center;
      min-height: 16px;
    }

    /* ─── CONFIRM MODAL ─── */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0,0,0,0.45);
      align-items: center;
      justify-content: center;
    }

    .confirm-overlay.open { display: flex; }

    .confirm-modal {
      background: #18181b;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 22px 20px 18px;
      width: 100%;
      max-width: 260px;
      text-align: center;
    }

    .confirm-modal p {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .confirm-btns {
      display: flex;
      gap: 8px;
    }

    .confirm-btn-cancel {
      flex: 1;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.28);
      color: #fff;
      padding: 7px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .confirm-btn-cancel:hover { background: rgba(255,255,255,0.08); }

    .confirm-btn-ok {
      flex: 1;
      background: #fff;
      color: #111;
      border: none;
      padding: 7px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .confirm-btn-ok:hover { opacity: 0.88; }

    /* placeholder for removed auth-success */
    .auth-success {
      font-size: 0.82rem;
      color: #4ade80;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    /* ─── MAIN ─── */
    main {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 20px;
      transition: justify-content 0.55s cubic-bezier(0.4, 0, 0.2, 1),
        padding-top 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    main.has-image {
      justify-content: flex-start;
      padding-top: 56px;
    }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      margin-bottom: 20px;
      transition: opacity 0.4s, transform 0.4s, max-height 0.5s;
      max-height: 150px;
      overflow: hidden;
    }

    main.has-image .hero {
      opacity: 0;
      max-height: 0;
      margin-bottom: 0;
      pointer-events: none;
      transform: translateY(-12px);
    }

    .hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
    }

    /* ─── CHAT FEED ─── */
    #chat-feed {
      display: none;
      width: 100%;
      max-width: 66vw;
      flex: 1;
      flex-direction: column;
      gap: 16px;
      overflow-y: scroll;
      padding: 8px 0 100px;
      scrollbar-width: none;
    }

    #chat-feed::-webkit-scrollbar {
      display: none;
    }

    main.has-image #chat-feed {
      display: flex;
    }

    /* ─── CUSTOM FIXED SCROLLBAR ─── */
    #feed-scrollbar {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 4px;
      bottom: 0;
      z-index: 40;
    }

    #feed-scrollbar.visible {
      display: block;
    }

    #feed-scrollbar-thumb {
      position: absolute;
      right: 0;
      width: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.18);
      transition: background 0.15s;
      cursor: pointer;
    }

    #feed-scrollbar:hover #feed-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.32);
    }

    /* ─── CHAT MESSAGES ─── */
    .msg-user {
      display: flex;
      justify-content: flex-end;
      animation: fadeUp 0.35s ease;
    }

    .msg-user-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      max-width: 80%;
      position: relative;
      padding-bottom: 12px;
    }

    .msg-copy-btn {
      position: absolute;
      bottom: 0;
      right: 10px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.38);
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
      z-index: 2;
    }

    .msg-copy-btn:hover {
      color: rgba(255, 255, 255, 0.85);
    }

    .msg-copy-btn .copy-check {
      display: none;
    }

    .msg-copy-btn.copied .copy-icon {
      display: none;
    }

    .msg-copy-btn.copied .copy-check {
      display: block;
    }

    .msg-copy-btn.copied {
      color: #4ade80 !important;
    }

    .msg-user-bubble {
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 14px 14px 3px 14px;
      padding: 9px 14px;
      font-size: 0.875rem;
      line-height: 1.45;
      color: #fff;
      word-break: break-word;
      width: 100%;
    }

    .msg-ai {
      display: flex;
      justify-content: flex-start;
      animation: fadeUp 0.4s ease;
    }

    .msg-ai-inner {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 90%;
    }

    /* Skeleton loader */
    .img-skeleton {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .img-skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.06) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .img-skeleton.sq  { width: 560px; height: 560px; max-width: 100%; }
    .img-skeleton.vert { width: 360px; height: 640px; max-width: 100%; }
    .img-skeleton.horiz { width: 640px; height: 360px; max-width: 100%; }

    .img-placeholder {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .img-placeholder.sq   { width: 560px; height: 560px; max-width: 100%; }
    .img-placeholder.vert { width: 360px; height: 640px; max-width: 100%; }
    .img-placeholder.horiz { width: 640px; height: 360px; max-width: 100%; }

    .img-placeholder-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(30,30,35,0.95) 0%,
        rgba(40,38,50,0.95) 50%,
        rgba(28,30,40,0.95) 100%
      );
    }

    .img-placeholder-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 12px;
    }

    .img-placeholder-icon {
      font-size: 2rem;
      margin-bottom: 6px;
      display: block;
      opacity: 0.6;
    }

    .img-placeholder-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      line-height: 1.4;
    }

    .img-placeholder-tokens {
      font-size: 0.75rem;
      font-weight: 500;
      color: #e879f9;
      margin-top: 4px;
    }

    .img-placeholder {
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .img-placeholder:hover {
      opacity: 0.88;
    }

    /* ─── LIGHTBOX ─── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      animation: lbFadeIn 0.22s ease;
    }

    #lightbox.open {
      display: flex;
    }

    @keyframes lbFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #lightbox-placeholder {
      border-radius: 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    #lightbox-placeholder .img-placeholder-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(30,30,35,0.98) 0%,
        rgba(40,38,50,0.98) 50%,
        rgba(28,30,40,0.98) 100%
      );
    }

    #lightbox-placeholder .img-placeholder-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
    }

    #lb-close-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 210;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, background 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #lb-close-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #lb-close-btn:hover {
      background: rgba(255,255,255,0.22);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── INPUT CARD ─── */
    .input-wrap {
      width: 100%;
      max-width: 600px;
      transition: max-width 0.5s ease;
      flex-shrink: 0;
    }

    main.has-image .input-wrap {
      max-width: 600px;
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
    }

    .input-card {
      background: rgba(28, 28, 30, 0.90);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.45);
    }

    textarea {
      width: 100%;
      min-height: 58px;
      max-height: 120px;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      line-height: 1.45;
      padding: 14px 14px 4px;
      caret-color: rgba(255, 255, 255, 0.7);
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.28);
    }

    textarea::-webkit-scrollbar { width: 6px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.0);
      border-radius: 3px;
    }
    textarea:hover::-webkit-scrollbar-thumb,
    textarea:focus::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.2);
    }
    textarea {
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }
    textarea:hover, textarea:focus {
      scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
    }

    /* ─── TOOLBAR ─── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px 10px;
    }

    .tb-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tb-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.38);
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      font-size: 15px;
    }

    .tb-btn:hover {
      color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.07);
    }

    /* ─── ASPECT RATIO TOGGLE ─── */
    .aspect-toggle {
      background: transparent;
      border: none;
      padding: 4px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
    }

    .aspect-toggle:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    .aspect-shape {
      border: 1.5px solid rgba(255, 255, 255, 0.8);
      border-radius: 3px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background: transparent;
      width: 14px;
      height: 14px;
    }

    .aspect-shape.vertical {
      width: 10px;
      height: 18px;
    }

    .aspect-shape.horizontal {
      width: 18px;
      height: 10px;
    }

    /* ─── QUALITY BUTTON ─── */
    .quality-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      min-width: 36px;
    }

    .quality-btn:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    .quality-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    /* ─── API MODE BUTTON ─── */
    .api-mode-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.38);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      letter-spacing: 0.02em;
    }

    .api-mode-btn:hover {
      color: rgba(255, 255, 255, 0.7);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .api-mode-btn.active {
      background: rgba(232, 121, 249, 0.15);
      border-color: rgba(232, 121, 249, 0.5);
      color: #e879f9;
    }

    /* ─── ATTACHMENT PREVIEWS ─── */
    .attachments-row {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 14px 0;
    }

    .attachments-row.has-files {
      display: flex;
    }

    .attachment-thumb {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 8px;
      overflow: visible;
      flex-shrink: 0;
    }

    .attachment-thumb img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .attachment-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ef4444;
      border: none;
      color: #fff;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      z-index: 2;
      transition: background 0.15s, transform 0.1s;
    }

    .attachment-remove:hover {
      background: #dc2626;
      transform: scale(1.15);
    }

    /* Real image in chat */
    .img-real {
      border-radius: 12px;
      display: block;
      max-width: 100%;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .img-real:hover {
      opacity: 0.9;
    }

    /* token counter */
    .token-counter {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.01em;
      user-select: none;
    }

    .token-ring {
      position: relative;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .token-ring svg {
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.12);
      stroke-width: 2;
    }

    .ring-fill {
      fill: none;
      stroke: #e879f9;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 50.3;
      stroke-dashoffset: 50.3;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s;
    }

    /* send button */
    .send-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      border: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-size: 13px;
    }

    .send-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.06);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── ERROR ─── */
    .error-msg {
      color: #f87171;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s;
      min-height: 0;
    }

    .error-msg.show {
      opacity: 1;
    }

    /* ─── IMAGE ACTION BUTTONS ─── */
    .img-actions {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;

      height: 28px;

      align-items: center;
      justify-content: center;
      cursor: pointer;

      font-size: 15px;

      .nav-logo { font-size: 1rem; }
      .logo-shape { width: 20px; height: 20px; }
      .btn-login, .btn-started { padding: 5px 10px; font-size: 0.75rem; }
      main { padding: 80px 12px 12px; }
      main.has-image { padding-top: 70px; }
      .hero h1 { font-size: 1.5rem; }
      .hero p { font-size: 0.8rem; }
      .input-card { border-radius: 12px; }
      textarea { font-size: 0.9rem; padding: 12px 12px 4px; }
      .toolbar { padding: 4px 8px 8px; }
      .tb-btn { width: 26px; height: 26px; }
      .send-btn { width: 28px; height: 28px; }
      .input-wrap {
        width: calc(100% - 24px) !important;
        max-width: calc(100% - 24px) !important;
        left: 12px !important;
        transform: none !important;
      }
      .user-email { display: none; }
    }

    @media (max-width: 765px) {
      #chat-feed { max-width: 100%; padding: 8px 12px 160px; }
      .msg-ai-inner { max-width: 100%; }
      .img-skeleton.sq,
      .img-placeholder.sq   { width: calc(100vw - 24px); height: calc(100vw - 24px); }
      .img-skeleton.vert,
      .img-placeholder.vert { width: calc((100vw - 24px) * 0.5625); height: calc(100vw - 24px); }
      .img-skeleton.horiz,
      .img-placeholder.horiz { width: calc(100vw - 24px); height: calc((100vw - 24px) * 0.5625); }
    }

    @media (min-width: 420px) and (max-width: 764px) {
      .img-skeleton.sq,
      .img-placeholder.sq,
      .img-real.sq   { width: calc((100vw - 24px) * 0.8) !important; height: calc((100vw - 24px) * 0.8) !important; }
      .img-skeleton.vert,
      .img-placeholder.vert,
      .img-real.vert { width: calc((100vw - 24px) * 0.8 * 0.5625) !important; height: calc((100vw - 24px) * 0.8) !important; }
      .img-skeleton.horiz,
      .img-placeholder.horiz,

    }

    /* ─── SIDEBAR TOGGLE BUTTON ─── */
    .sidebar-toggle {
      display: none;
    }

    /* Desktop fixed toggle */
    .sidebar-toggle-desktop {
      display: flex;
      position: fixed;
      top: 8px;
      left: 32px;
      z-index: 200;
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: left 0.22s cubic-bezier(0.4,0,0.2,1), color 0.15s;

    /* When sidebar is open - button rides with panel */
    .sidebar-toggle-desktop.with-panel {
      transition: left 0.22s cubic-bezier(0.4,0,0.2,1), color 0.15s;
    }

    /* Mobile fixed toggle */
    .sidebar-toggle-mobile {
      display: none;
      position: fixed;
      top: 13px;
      left: 16px;
      z-index: 200;
      width: 26px;
      height: 26px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;

    .sidebar {

      left: 0;

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px 8px 8px;

    .sidebar-new-btn {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);

      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;

    .sidebar-new-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .sidebar-list::-webkit-scrollbar { width: 3px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.12s;
      position: relative;
    }
    .chat-item:hover { background: rgba(255,255,255,0.06); }
    .chat-item.active { background: rgba(255,255,255,0.1); }

    .chat-item-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      flex-shrink: 0;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-item-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-item-icon svg { opacity: 0.35; }

    .chat-item-text {
      flex: 1;
      min-width: 0;
    }
    .chat-item-name {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-item.active .chat-item-name { color: #fff; }
    .chat-item-date {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      margin-top: 1px;
    }

    .chat-item-del {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.12s;
      flex-shrink: 0;
      padding: 0;
    }
    .chat-item-del:hover, .chat-item-del:active { color: #f87171; }

    /* Sidebar overlay (backdrop) */
    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 54;
      background: rgba(0,0,0,0.3);
    }
    .sidebar-backdrop.open { display: block; }

    /* ─── MOBILE SIDEBAR (≤600px) ─── */
    @media (max-width: 600px) {
      .sidebar-toggle { display: none !important; }
      .sidebar-toggle-desktop { display: none !important; }
      .sidebar-toggle-mobile { display: flex !important; }
      .sidebar {
        width: 100%;
        max-width: 100%;
        height: auto;
        max-height: 33vh;
        top: 0;
        left: 0;
        right: 0;
        bottom: auto;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        transform: translateY(-100%);
        transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar.open { transform: translateY(0); }
      .sidebar-list { display: flex; flex-direction: column; overflow-y: auto; }
      .sidebar-header { justify-content: flex-end; padding-right: 20px; }
    }
  </style>
</head>

    // --- Create new chat ---
    function createChat() {
      const id = Date.now()
      const chat = { id, name: 'New chat', messages: [], createdAt: new Date().toISOString(), preview: null }
      const chats = loadChats()
      chats.unshift(chat)
      saveChats(chats)
      return chat
    }

    // --- Save message to active chat ---
    function saveMsgToChat(type, data) {
      // type: 'user' | 'image'
      const chats = loadChats()
      const idx = chats.findIndex(c => c.id === activeChatId)
      if (idx === -1) return
      const chat = chats[idx]

      if (!chat.messages) chat.messages = []
      chat.messages.push({ type, data, ts: Date.now() })

      // Auto-name from first user message
      if (type === 'user' && chat.name === 'New chat') {
        chat.name = data.slice(0, 32) + (data.length > 32 ? '…' : '')
      }
      // Preview = first image url
      if (type === 'image' && !chat.preview) {
        chat.preview = data.imageUrl
      }

      chats[idx] = chat
      saveChats(chats)
      renderSidebar()
    }

    function formatAgo(iso) {
      const diff = Date.now() - new Date(iso).getTime()
      const m = Math.floor(diff / 60000)
      if (m < 1) return 'Just now'
      if (m < 60) return m + 'm ago'
      const h = Math.floor(m / 60)
      if (h < 24) return h + 'h ago'
      return Math.floor(h / 24) + 'd ago'
    }

    function updateTogglePos(open) {
      const btn = document.getElementById('sidebarToggleDesktop')
      if (!btn) return
      if (window.innerWidth <= 600) return

      if (open) {
        const sw = getSidebarWidth()
        const finalLeft = sw - 36 - 10  // inside panel with 10px from right edge

        // Delay = time for panel to reach the button's current position (left:32px)
        // Panel animates 0 -> sw in 220ms, button is at 32px
        // Time when panel reaches button: (32/sw) * 220ms
        const delayMs = Math.round((32 / sw) * 220)

        btn.style.transition = `left 0.22s cubic-bezier(0.4,0,0.2,1) ${delayMs}ms, color 0.15s`
        btn.style.left = finalLeft + 'px'
      } else {
        // On close - move immediately back before panel disappears
        btn.style.transition = 'left 0.22s cubic-bezier(0.4,0,0.2,1) 0ms, color 0.15s'
        btn.style.left = '32px'
      }
    }

    const TOKEN_BUDGET = 5000

    function formatTokens(n) {

      return (n / 1000).toFixed(1) + 'k'
    }

    function updateTokenUI(used) {
      sessionTokens += used
      const capped = Math.min(sessionTokens, TOKEN_BUDGET)
      const pct    = capped / TOKEN_BUDGET
      const offset = CIRCUM * (1 - pct)
      document.getElementById('tokenText').textContent = formatTokens(sessionTokens) + ' / ' + formatTokens(TOKEN_BUDGET)
      const ring = document.getElementById('ringFill')
      ring.style.strokeDashoffset = offset
      if (pct < 0.5)      ring.style.stroke = '#e879f9'
      else if (pct < 0.8) ring.style.stroke = '#fbbf24'
      else                ring.style.stroke = '#f87171'
    }

      if (files.length > remaining) showError('Maximum 4 images allowed.')

    // ─── MAIN GENERATE ───
    async function generate() {
      const promptEl = document.getElementById('prompt')
      const prompt   = promptEl.value.trim()
      if (!prompt) { showError('Please enter a prompt.'); return }

      // Если API режим — требуем авторизацию
      if (apiMode && !currentUser) {
        openAuthModal('login')
        showError('Please log in to generate images.')
        return
      }

      // Ensure we have an active chat
      if (!activeChatId) {
        const chat = createChat()
        activeChatId = chat.id
        localStorage.setItem(ACTIVE_KEY, chat.id)
      }
      document.getElementById('main').classList.add('has-image')
      appendUserMessage(prompt)

      const savedPrompt = prompt
      const savedFiles  = [...attachedFiles]
      const aspect      = aspectClasses[aspectIndex]
      const quality     = qualityState

      promptEl.value = ''
      attachedFiles  = []
      renderAttachments()
      setSending(true)

      const skeletonEl = appendSkeletonLoader(aspect)

      if (apiMode) {
        // ── REAL API через Edge Function ──
        try {
          // Получаем свежую сессию
          let { data: { session } } = await _supabase.auth.getSession()

          // Если сессия протухла — обновляем токен
          if (!session) {
            const { data: refreshed } = await _supabase.auth.refreshSession()
            session = refreshed?.session
          }

          const token = session?.access_token
          console.log('Token present:', !!token, 'Token start:', token?.slice(0, 20))

          if (!token) {
            showError('Session expired. Please log in again.')
            feed_removeEl(skeletonEl)
            setSending(false)
            openAuthModal()
            return
          }

          const response = await fetch(EDGE_FN_URL, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              prompt: savedPrompt,
              aspect_ratio: aspectValues[aspectIndex],
              image_size: qualitySizeMap[quality],
              images: savedFiles.map(f => f.dataUrl),
            })
          })

          const data = await response.json()
          if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`)

          const { imageUrl, tokens } = data
          const label = qualityNames[quality]

          replaceSkeletonReal(skeletonEl, imageUrl, label, tokens, aspect)
          updateTokenUI(tokens)
          saveToHistory(savedPrompt, imageUrl, tokens, aspect, label)

        } catch (e) {
          showError('Generation failed: ' + e.message)
          feed_removeEl(skeletonEl)
        }

      } else {
        // ── MOCK GENERATION ──
        const [dMin, dMax] = delayRanges[quality]
        const [tMin, tMax] = tokenRanges[quality]
        const tokens = randInt(tMin, tMax)
        const label  = qualityNames[quality]

        await new Promise(resolve => setTimeout(resolve, randInt(dMin, dMax)))
        replaceSkeleton(skeletonEl, tokens, label, aspect, savedPrompt)
        updateTokenUI(tokens)
      }

      setSending(false)
    }

    function feed_removeEl(el) {
      try { document.getElementById('chat-feed').removeChild(el) } catch(_) {}
    }

    // ─── REPLACE SKELETON WITH REAL IMAGE ───
    function replaceSkeletonReal(skeletonEl, imageUrl, qualityLabel, tokens, aspectClass) {
      const feed    = document.getElementById('chat-feed')
      const wrapper = document.createElement('div')
      wrapper.className = 'msg-ai'
      wrapper.innerHTML = `
        <div class="msg-ai-inner">
          <img class="img-real ${aspectClass}" src="${imageUrl}" alt="Generated image" title="Click to expand" />
          <div class="img-actions">
            <button class="img-action-btn dl-real-btn" title="Download image">
              <svg class="dl-icon" width="14" height="14" viewBox="0 0 15 15" fill="none">
                <path d="M7.5 2v8M7.5 10L4 6.5M7.5 10L11 6.5M2 13h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>`

      wrapper.querySelector('.img-real').addEventListener('click', () =>
        openLightboxReal(imageUrl, qualityLabel, tokens, aspectClass))

      wrapper.querySelector('.dl-real-btn').addEventListener('click', () => {
        const a = document.createElement('a')
        a.href = imageUrl
        a.download = 'imagine-' + Date.now() + '.png'
        a.click()
      })

      feed.replaceChild(wrapper, skeletonEl)
      scrollFeedToBottom()
      // Save to chat storage
      saveMsgToChat('image', { imageUrl, qualityLabel, tokens, aspect: aspectClass })
    }

    // ─── REPLACE SKELETON (MOCK) ───
    function replaceSkeleton(skeletonEl, tokens, qualityLabel, aspectClass, promptText) {
      const feed    = document.getElementById('chat-feed')
      const wrapper = document.createElement('div')
      wrapper.className = 'msg-ai'
      wrapper.innerHTML = `
        <div class="msg-ai-inner">
          <div class="img-placeholder ${aspectClass}" title="Click to expand">
            <div class="img-placeholder-bg"></div>
            <div class="img-placeholder-content">
              <span class="img-placeholder-icon">✦</span>
              <div class="img-placeholder-label">${qualityLabel} · Generated</div>
              <div class="img-placeholder-tokens">${tokens} tokens</div>
            </div>
          </div>
          <div class="img-actions">
            <button class="img-action-btn" title="Download image">
              <svg class="dl-icon" width="14" height="14" viewBox="0 0 15 15" fill="none">
                <path d="M7.5 2v8M7.5 10L4 6.5M7.5 10L11 6.5M2 13h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>`

      wrapper.querySelector('.img-placeholder').addEventListener('click', () =>
        openLightbox(qualityLabel, tokens, aspectClass))
      wrapper.querySelector('.img-action-btn').addEventListener('click', () =>
        downloadFromCard(qualityLabel, tokens, aspectClass))

      feed.replaceChild(wrapper, skeletonEl)
      scrollFeedToBottom()
      // Save mock to chat storage
      saveMsgToChat('image', { imageUrl: null, qualityLabel, tokens, aspect: aspectClass })
    }

    // ─── LIGHTBOX ───
    const aspectDims = {
      sq:    { w: 560, h: 560 },
      vert:  { w: 360, h: 640 },
      horiz: { w: 640, h: 360 }
    }

    function openLightbox(label, tokens, aspectClass) {
      const lb   = document.getElementById('lightbox')
      const ph   = document.getElementById('lightbox-placeholder')
      const base = aspectDims[aspectClass] || aspectDims.sq
      const ratio= base.w / base.h
      const vw   = window.innerWidth, vh = window.innerHeight
      let w, h
      if (vw / vh > ratio) { h = vh; w = vh * ratio }
      else                 { w = vw; h = vw / ratio }
      ph.style.width  = Math.round(w) + 'px'
      ph.style.height = Math.round(h) + 'px'
      ph.style.borderRadius = '0'
      document.getElementById('lb-label').textContent  = label + ' · Generated'
      document.getElementById('lb-tokens').textContent = tokens + ' tokens'
      lb.classList.add('open')
      document.addEventListener('keydown', lbKeyHandler)
    }

    function openLightboxReal(imageUrl, label, tokens, aspectClass) {
      const lb   = document.getElementById('lightbox')
      const ph   = document.getElementById('lightbox-placeholder')
      ph.innerHTML = `<img src="${imageUrl}" style="width:100%;height:100%;object-fit:contain;display:block;" alt="Generated image"/>`
      ph.style.background = 'transparent'
      const base = aspectDims[aspectClass] || aspectDims.sq
      const ratio= base.w / base.h
      const vw   = window.innerWidth, vh = window.innerHeight
      let w, h
      if (vw / vh > ratio) { h = vh; w = vh * ratio }
      else                 { w = vw; h = vw / ratio }
      ph.style.width  = Math.round(w) + 'px'
      ph.style.height = Math.round(h) + 'px'
      ph.style.borderRadius = '0'
      lb.classList.add('open')
      document.addEventListener('keydown', lbKeyHandler)
    }

    function handleLightboxClick(e) {
      if (e.target.closest('#lb-close-btn')) return
      closeLightbox()
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open')
      document.getElementById('lb-close-btn').classList.remove('visible')
      document.removeEventListener('keydown', lbKeyHandler)
    }

    function lbKeyHandler(e) { if (e.key === 'Escape') closeLightbox() }

    function downloadFromCard(qualityLabel, tokens, aspectClass) {
      const dims = aspectDims[aspectClass] || aspectDims.sq
      const w = dims.w, h = dims.h
      const canvas = document.createElement('canvas')
      canvas.width = w * 2; canvas.height = h * 2
      const ctx = canvas.getContext('2d')
      ctx.scale(2, 2)
      const grd = ctx.createLinearGradient(0, 0, w, h)
      grd.addColorStop(0,   '#1e1e23')
      grd.addColorStop(0.5, '#28263a')
      grd.addColorStop(1,   '#1c1e28')
      ctx.fillStyle = grd
      ctx.fillRect(0, 0, w, h)
      const fontSize = Math.max(14, Math.round(w * 0.04))
      ctx.fillStyle = 'rgba(255,255,255,0.45)'
      ctx.font = `600 ${fontSize}px Inter, sans-serif`
      ctx.textAlign = 'center'
      ctx.fillText(qualityLabel + ' · Generated', w/2, h/2 - fontSize * 0.6)
      ctx.fillStyle = '#e879f9'
      ctx.font = `500 ${Math.round(fontSize * 0.95)}px Inter, sans-serif`
      ctx.fillText(tokens + ' tokens', w/2, h/2 + fontSize * 1.2)
      const a = document.createElement('a')
      a.href = canvas.toDataURL('image/png')
      a.download = 'imagine-' + Date.now() + '.png'
      a.click()
    }

    function escapeHtml(text) {
      const d = document.createElement('div')
      d.appendChild(document.createTextNode(text))
      return d.innerHTML
    }

    // ─── CUSTOM SCROLLBAR ───
    ;(function() {
      const feed  = document.getElementById('chat-feed')
      const bar   = document.getElementById('feed-scrollbar')
      const thumb = document.getElementById('feed-scrollbar-thumb')

      function updateThumb() {
        const scrollH = feed.scrollHeight
        const clientH = feed.clientHeight
        if (scrollH <= clientH) { bar.classList.remove('visible'); return }
        bar.classList.add('visible')
        const winH    = window.innerHeight
        const thumbH  = Math.max(36, (clientH / scrollH) * winH)
        const maxTop  = winH - thumbH
        const ratio   = feed.scrollTop / (scrollH - clientH)
        thumb.style.height = thumbH + 'px'
        thumb.style.top    = (ratio * maxTop) + 'px'
      }

      feed.addEventListener('scroll', updateThumb)
      window.addEventListener('resize', updateThumb)
      new MutationObserver(updateThumb).observe(feed, { childList: true, subtree: true })

      let dragging = false, startY = 0, startScroll = 0
      thumb.addEventListener('mousedown', e => {
        dragging = true; startY = e.clientY; startScroll = feed.scrollTop; e.preventDefault()
      })
      document.addEventListener('mousemove', e => {
        if (!dragging) return
        const maxTop = window.innerHeight - thumb.offsetHeight
        const dy     = e.clientY - startY
        feed.scrollTop = startScroll + (dy / maxTop) * (feed.scrollHeight - feed.clientHeight)
      })
      document.addEventListener('mouseup', () => { dragging = false })
    })()

    // ─── START ───
    initChats()
    initAuth()
  </script>
