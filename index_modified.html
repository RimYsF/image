<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagine — AI Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      filter: brightness(1.1);
      height: 100%;
      font-family: 'Inter', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* BG photo */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: url('q.jpg') center/cover no-repeat;
    }

    /* dark overlay so text reads well */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 32px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      text-decoration: none;
      color: #fff;
    }

    .logo-shape {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #f97316 0%, #ec4899 40%, #8b5cf6 80%, #06b6d4 100%);
      clip-path: polygon(50% 0%, 85% 15%, 100% 50%, 85% 85%, 50% 100%, 15% 85%, 0% 50%, 15% 15%);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      list-style: none;
      margin-left: 4%;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .nav-links a:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-links .chevron {
      font-size: 9px;
      opacity: 0.7;
    }

    .nav-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-login {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.28);
      color: #fff;
      padding: 5px 14px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-login:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.45);
    }

    .btn-started {
      background: #fff;
      color: #111;
      border: none;
      padding: 5px 14px;
      border-radius: 7px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-started:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    /* ─── MAIN ─── */
    main {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 20px;
      transition: justify-content 0.55s cubic-bezier(0.4, 0, 0.2, 1),
        padding-top 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    main.has-image {
      justify-content: flex-start;
      padding-top: 56px;
    }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      margin-bottom: 20px;
      transition: opacity 0.4s, transform 0.4s, max-height 0.5s;
      max-height: 150px;
      overflow: hidden;
    }

    main.has-image .hero {
      opacity: 0;
      max-height: 0;
      margin-bottom: 0;
      pointer-events: none;
      transform: translateY(-12px);
    }

    .hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
    }

    /* ─── CHAT FEED ─── */
    #chat-feed {
      display: none;
      width: 100%;
      max-width: 66vw;
      flex: 1;
      flex-direction: column;
      gap: 16px;
      overflow-y: scroll;
      padding: 8px 0 100px;
      scrollbar-width: none;
    }

    #chat-feed::-webkit-scrollbar {
      display: none;
    }

    main.has-image #chat-feed {
      display: flex;
    }

    /* ─── CUSTOM FIXED SCROLLBAR ─── */
    #feed-scrollbar {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 4px;
      bottom: 0;
      z-index: 40;
    }

    #feed-scrollbar.visible {
      display: block;
    }

    #feed-scrollbar-thumb {
      position: absolute;
      right: 0;
      width: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.18);
      transition: background 0.15s;
      cursor: pointer;
    }

    #feed-scrollbar:hover #feed-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.32);
    }

    /* ─── CHAT MESSAGES ─── */
    /* User bubble */
    .msg-user {
      display: flex;
      justify-content: flex-end;
      animation: fadeUp 0.35s ease;
    }

    .msg-user-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      max-width: 80%;
      position: relative;
      padding-bottom: 12px;
    }

    .msg-copy-btn {
      position: absolute;
      bottom: 0;
      right: 10px;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.38);
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
      z-index: 2;
    }

    .msg-copy-btn:hover {
      color: rgba(255, 255, 255, 0.85);
    }

    .msg-copy-btn .copy-check {
      display: none;
    }

    .msg-copy-btn.copied .copy-icon {
      display: none;
    }

    .msg-copy-btn.copied .copy-check {
      display: block;
    }

    .msg-copy-btn.copied {
      color: #4ade80 !important;
    }

    .msg-user-bubble {
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 14px 14px 3px 14px;
      padding: 9px 14px;
      font-size: 0.875rem;
      line-height: 1.45;
      color: #fff;
      word-break: break-word;
      width: 100%;
    }

    /* AI image block */
    .msg-ai {
      display: flex;
      justify-content: flex-start;
      animation: fadeUp 0.4s ease;
    }

    .msg-ai-inner {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 90%;
    }

    /* Skeleton loader */
    .img-skeleton {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .img-skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.06) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Image sizes for skeleton based on aspect */
    .img-skeleton.sq  { width: 560px; height: 560px; max-width: 100%; }
    .img-skeleton.vert { width: 360px; height: 640px; max-width: 100%; }
    .img-skeleton.horiz { width: 640px; height: 360px; max-width: 100%; }

    /* Placeholder image block */
    .img-placeholder {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .img-placeholder.sq   { width: 560px; height: 560px; max-width: 100%; }
    .img-placeholder.vert { width: 360px; height: 640px; max-width: 100%; }
    .img-placeholder.horiz { width: 640px; height: 360px; max-width: 100%; }

    .img-placeholder-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(30,30,35,0.95) 0%,
        rgba(40,38,50,0.95) 50%,
        rgba(28,30,40,0.95) 100%
      );
    }

    .img-placeholder-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 12px;
    }

    .img-placeholder-icon {
      font-size: 2rem;
      margin-bottom: 6px;
      display: block;
      opacity: 0.6;
    }

    .img-placeholder-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      line-height: 1.4;
    }

    .img-placeholder-tokens {
      font-size: 0.75rem;
      font-weight: 500;
      color: #e879f9;
      margin-top: 4px;
    }

    /* Clickable placeholder */
    .img-placeholder {
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .img-placeholder:hover {
      opacity: 0.88;
    }

    /* ─── LIGHTBOX ─── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.95);
      align-items: center;
      justify-content: center;
      animation: lbFadeIn 0.22s ease;
      cursor: pointer;
    }

    #lightbox.open {
      display: flex;
    }

    @keyframes lbFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* The actual lightbox placeholder — fullscreen */
    #lightbox-placeholder {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      border-radius: 0;
    }

    #lightbox-placeholder .img-placeholder-bg {
      position: absolute;
      inset: 0;
    }

    #lightbox-placeholder .img-placeholder-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
    }

    #lightbox-placeholder .img-placeholder-icon {
      font-size: 3rem;
      margin-bottom: 10px;
      display: block;
      opacity: 0.6;
    }

    #lightbox-placeholder .img-placeholder-label {
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    #lightbox-placeholder .img-placeholder-tokens {
      font-size: 1rem;
      font-weight: 500;
      color: #e879f9;
      margin-top: 6px;
    }

    /* Close button — top right corner */
    #lb-close-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 210;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, background 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #lb-close-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #lb-close-btn:hover {
      background: rgba(255,255,255,0.22);
    }

    .lb-close-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .lb-close-btn:hover {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    .lb-dl-btn {
      background: #fff;
      border: none;
      color: #111;
      border-radius: 8px;
      padding: 7px 18px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lb-dl-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── INPUT CARD ─── */
    .input-wrap {
      width: 100%;
      max-width: 600px;
      transition: max-width 0.5s ease;
      flex-shrink: 0;
    }

    main.has-image .input-wrap {
      max-width: 600px;
    }

    /* When chat is active — fix input to bottom center */
    main.has-image .input-wrap {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
    }

    .input-card {
      background: rgba(28, 28, 30, 0.90);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.45);
    }

    textarea {
      width: 100%;
      min-height: 58px;
      max-height: 120px;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      line-height: 1.45;
      padding: 14px 14px 4px;
      caret-color: rgba(255, 255, 255, 0.7);
    }

    textarea::placeholder {
      color: rgba(255, 255, 255, 0.28);
    }

    textarea::-webkit-scrollbar { width: 6px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.0);
      border-radius: 3px;
      transition: background-color 0.3s;
    }
    textarea:hover::-webkit-scrollbar-thumb,
    textarea:focus::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.2);
    }
    textarea {
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }
    textarea:hover, textarea:focus {
      scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
    }

    /* ─── TOOLBAR ─── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px 10px;
    }

    .tb-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tb-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.38);
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      font-size: 15px;
    }

    .tb-btn:hover {
      color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.07);
    }

    /* ─── ASPECT RATIO TOGGLE ─── */
    .aspect-toggle {
      background: transparent;
      border: none;
      padding: 4px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
    }

    .aspect-toggle:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    .aspect-shape {
      border: 1.5px solid rgba(255, 255, 255, 0.8);
      border-radius: 3px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background: transparent;
      width: 14px;
      height: 14px;
    }

    .aspect-shape.vertical {
      width: 10px;
      height: 18px;
    }

    .aspect-shape.horizontal {
      width: 18px;
      height: 10px;
    }

    /* ─── QUALITY BUTTON ─── */
    .quality-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      min-width: 36px;
    }

    .quality-btn:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    .quality-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    /* ─── API MODE BUTTON ─── */
    .api-mode-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.38);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      letter-spacing: 0.02em;
    }

    .api-mode-btn:hover {
      color: rgba(255, 255, 255, 0.7);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .api-mode-btn.active {
      background: rgba(232, 121, 249, 0.15);
      border-color: rgba(232, 121, 249, 0.5);
      color: #e879f9;
    }

    /* ─── ATTACHMENT PREVIEWS ─── */
    .attachments-row {
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 14px 0;
    }

    .attachments-row.has-files {
      display: flex;
    }

    .attachment-thumb {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 8px;
      overflow: visible;
      flex-shrink: 0;
    }

    .attachment-thumb img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .attachment-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ef4444;
      border: none;
      color: #fff;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      z-index: 2;
      transition: background 0.15s, transform 0.1s;
    }

    .attachment-remove:hover {
      background: #dc2626;
      transform: scale(1.15);
    }

    /* Real image in chat */
    .img-real {
      border-radius: 12px;
      display: block;
      max-width: 100%;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .img-real:hover {
      opacity: 0.9;
    }

    /* token counter */
    .token-counter {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(255, 255, 255, 0.35);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.01em;
      user-select: none;
    }

    .token-ring {
      position: relative;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .token-ring svg {
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.12);
      stroke-width: 2;
    }

    .ring-fill {
      fill: none;
      stroke: #e879f9;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 50.3;
      stroke-dashoffset: 50.3;
      transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.4s;
    }

    /* send button */
    .send-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      border: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-size: 13px;
    }

    .send-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.06);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* spinner inside send btn */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── ERROR ─── */
    .error-msg {
      color: #f87171;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s;
      min-height: 0;
    }

    .error-msg.show {
      opacity: 1;
    }

    /* ─── MOBILE OPTIMIZATION (≤600px) ─── */
    @media (max-width: 600px) {
      nav {
        padding: 12px 16px;
      }

      .nav-links {
        display: none;
      }

      .nav-logo {
        font-size: 1rem;
      }

      .logo-shape {
        width: 20px;
        height: 20px;
      }

      .btn-login, .btn-started {
        padding: 5px 10px;
        font-size: 0.75rem;
      }

      main {
        padding: 80px 12px 12px;
      }

      main.has-image {
        padding-top: 70px;
      }

      .hero h1 {
        font-size: 1.5rem;
      }

      .hero p {
        font-size: 0.8rem;
      }

      .input-card {
        border-radius: 12px;
      }

      textarea {
        font-size: 0.9rem;
        padding: 12px 12px 4px;
      }

      .toolbar {
        padding: 4px 8px 8px;
      }

      .tb-btn {
        width: 26px;
        height: 26px;
      }

      .send-btn {
        width: 28px;
        height: 28px;
      }

      .input-wrap {
        width: calc(100% - 24px) !important;
        max-width: calc(100% - 24px) !important;
        left: 12px !important;
        transform: none !important;
      }
    }

    /* ─── FEED + IMAGE SIZING (≤765px) ─── */
    @media (max-width: 765px) {
      #chat-feed {
        max-width: 100%;
        padding: 8px 12px 160px;
      }

      .msg-ai-inner {
        max-width: 100%;
      }

      .img-skeleton.sq,
      .img-placeholder.sq   { width: calc(100vw - 24px); height: calc(100vw - 24px); }
      .img-skeleton.vert,
      .img-placeholder.vert { width: calc((100vw - 24px) * 0.5625); height: calc(100vw - 24px); }
      .img-skeleton.horiz,
      .img-placeholder.horiz { width: calc(100vw - 24px); height: calc((100vw - 24px) * 0.5625); }
    }

    /* ─── IMAGE SIZE REDUCTION 420–764px (–20%) ─── */
    @media (min-width: 420px) and (max-width: 764px) {
      .img-skeleton.sq,
      .img-placeholder.sq,
      .img-real.sq   { width: calc((100vw - 24px) * 0.8) !important; height: calc((100vw - 24px) * 0.8) !important; }
      .img-skeleton.vert,
      .img-placeholder.vert,
      .img-real.vert { width: calc((100vw - 24px) * 0.8 * 0.5625) !important; height: calc((100vw - 24px) * 0.8) !important; }
      .img-skeleton.horiz,
      .img-placeholder.horiz,
      .img-real.horiz { width: calc((100vw - 24px) * 0.8) !important; height: calc((100vw - 24px) * 0.8 * 0.5625) !important; }
    }

    /* ─── TABLET / SMALL DESKTOP OPTIMIZATION ─── */
    @media (min-width: 766px) and (max-width: 1080px) {
      #chat-feed {
        max-width: 100%;
        padding: 8px 24px 100px;
      }

      .msg-ai-inner {
        max-width: 100%;
      }

      .img-skeleton.sq,
      .img-placeholder.sq   { width: calc(66vw - 48px); height: calc(66vw - 48px); max-width: 560px; max-height: 560px; }
      .img-skeleton.vert,
      .img-placeholder.vert { width: calc((66vw - 48px) * 0.5625); height: calc(66vw - 48px); max-width: 360px; max-height: 640px; }
      .img-skeleton.horiz,
      .img-placeholder.horiz { width: calc(66vw - 48px); height: calc((66vw - 48px) * 0.5625); max-width: 640px; max-height: 360px; }
    }

    /* Clickable placeholder */
    .img-placeholder {
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .img-placeholder:hover {
      opacity: 0.85;
    }

    /* ─── IMAGE ACTION BUTTONS ─── */
    .img-actions {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    /* On desktop — button sits to the right of the image, vertically centered */
    @media (min-width: 765px) {
      .msg-ai-inner {
        flex-direction: row;
        align-items: center;
        gap: 10px;
      }

      .img-actions {
        margin-top: 0;
        flex-direction: column;
        align-self: center;
      }
    }

    .img-action-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.38);
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      font-size: 15px;
      position: relative;
    }

    .img-action-btn:hover {
      color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.07);
    }

    .img-action-btn .copy-check {
      display: none;
    }

    .img-action-btn.copied .copy-icon {
      display: none;
    }

    .img-action-btn.copied .copy-check {
      display: block;
    }

    .img-action-btn.copied {
      color: #4ade80;
    }

    /* ─── LIGHTBOX ─── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      animation: lbFadeIn 0.22s ease;
    }

    #lightbox.open {
      display: flex;
    }

    @keyframes lbFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #lightbox-placeholder {
      border-radius: 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    #lightbox-placeholder .img-placeholder-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(30,30,35,0.98) 0%,
        rgba(40,38,50,0.98) 50%,
        rgba(28,30,40,0.98) 100%
      );
    }

    #lightbox-placeholder .img-placeholder-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
    }

  </style>
</head>

<body>

  <div class="bg"></div>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="#">
      <div class="logo-shape"></div>
      Imagine
    </a>
    <ul class="nav-links">

      <li><a href="#">Security</a></li>
    </ul>
    <div class="nav-right">
      <button class="btn-login">Log in</button>

    </div>
  </nav>

  <!-- MAIN -->
  <main id="main">

    <div class="hero">
      <h1>Imagine something beautiful</h1>
      <p>Generate stunning images by describing what you see in your mind</p>
    </div>

    <!-- Chat history feed -->
    <div id="chat-feed"></div>

    <!-- Custom fixed scrollbar -->
    <div id="feed-scrollbar"><div id="feed-scrollbar-thumb"></div></div>

    <!-- Input card -->
    <div class="input-wrap">
      <div class="input-card">
        <textarea id="prompt" placeholder="Ask Imagine to create…" rows="3" onkeydown="handleKey(event)"></textarea>
        <div class="attachments-row" id="attachmentsRow"></div>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFileInput(event)"/>
        <div class="toolbar">
          <div class="tb-left">
            <!-- + button -->
            <button class="tb-btn" title="Add attachment" onclick="document.getElementById('fileInput').click()">
              <svg width="15" height="15" viewBox="0 0 18 18" fill="none">
                <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>

            <!-- ASPECT TOGGLE BUTTON -->
            <button class="aspect-toggle" id="aspectToggle" title="Change Aspect Ratio">

            <!-- API MODE TOGGLE -->

              </svg>
              <span>API</span>
            </button>
          </div>
          <div class="tb-right">
            <!-- quality button -->
            <button class="quality-btn" id="qualityBtn" onclick="cycleQuality()" title="Image quality">
              HD
            </button>
            <!-- token counter -->
            <div class="token-counter" id="tokenCounter">
              <span id="tokenText">0 / 5.0k</span>
              <div class="token-ring">
                <svg width="18" height="18" viewBox="0 0 18 18">
                  <circle class="ring-bg" cx="9" cy="9" r="8" />
                  <circle class="ring-fill" id="ringFill" cx="9" cy="9" r="8" />
                </svg>
              </div>
            </div>

            <!-- send -->
            <button class="send-btn" id="sendBtn" onclick="generate()" title="Generate">
              <svg width="13" height="13" viewBox="0 0 15 15" fill="none">
                <path d="M7.5 13V2M7.5 2L3 6.5M7.5 2L12 6.5" stroke="white" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox" onclick="handleLightboxClick(event)">
    <button id="lb-close-btn" onclick="closeLightbox(); event.stopPropagation();" title="Close">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M2 2L14 14M14 2L2 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="lightbox-placeholder">
      <div class="img-placeholder-bg"></div>
      <div class="img-placeholder-content">
        <span class="img-placeholder-icon">✦</span>
        <div class="img-placeholder-label" id="lb-label"></div>
        <div class="img-placeholder-tokens" id="lb-tokens"></div>
      </div>
    </div>
  </div>

  <script>
    const TOKEN_BUDGET = 5000;
    const CIRCUM = 2 * Math.PI * 8; // 50.27

    let sessionTokens = 0;
    let aspectIndex = 0;
    const aspectValues = ['1:1', '9:16', '16:9'];
    const aspectClasses = ['sq', 'vert', 'horiz'];

    // Quality:
    // 0: "HD" no-bg  → Standard → ~500–600 tokens
    // 1: "HD" active → HD       → ~1000–1200 tokens
    // 2: "4K" active → 4K       → ~2100–2500 tokens
    let qualityState = 0;
    const qualityLabels = ['HD', 'HD', '4K'];
    const qualityNames  = ['Standard', 'HD', '4K'];

    // Token ranges per quality state [min, max]
    const tokenRanges = [
      [500, 600],
      [1000, 1200],
      [2100, 2500]
    ];

    // Generation delay ranges per quality [min ms, max ms]
    const delayRanges = [
      [1000, 2000],
      [1500, 2500],
      [2000, 3000]
    ];

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function formatTokens(n) {
      if (n < 1000) return n.toString();
      return (n / 1000).toFixed(1) + 'k';
    }

    function updateTokenUI(used) {
      sessionTokens += used;
      const capped = Math.min(sessionTokens, TOKEN_BUDGET);
      const pct = capped / TOKEN_BUDGET;
      const offset = CIRCUM * (1 - pct);

      document.getElementById('tokenText').textContent =
        formatTokens(sessionTokens) + ' / ' + formatTokens(TOKEN_BUDGET);

      const ring = document.getElementById('ringFill');
      ring.style.strokeDashoffset = offset;

      if (pct < 0.5) ring.style.stroke = '#e879f9';
      else if (pct < 0.8) ring.style.stroke = '#fbbf24';
      else ring.style.stroke = '#f87171';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4500);
    }

    function setSending(on) {
      const btn = document.getElementById('sendBtn');
      btn.disabled = on;
      btn.innerHTML = on
        ? '<div class="spinner"></div>'
        : '<svg width="13" height="13" viewBox="0 0 15 15" fill="none"><path d="M7.5 13V2M7.5 2L3 6.5M7.5 2L12 6.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generate();
      }
    }

    // Aspect toggle
    const aspectToggleBtn = document.getElementById('aspectToggle');
    const aspectShapeEl = document.getElementById('aspectShape');

    aspectToggleBtn.addEventListener('click', () => {
      aspectIndex = (aspectIndex + 1) % 3;
      aspectShapeEl.classList.remove('vertical', 'horizontal');
      if (aspectIndex === 1) aspectShapeEl.classList.add('vertical');
      else if (aspectIndex === 2) aspectShapeEl.classList.add('horizontal');
    });

    // Quality cycle
    function cycleQuality() {
      qualityState = (qualityState + 1) % 3;
      const btn = document.getElementById('qualityBtn');
      btn.textContent = qualityLabels[qualityState];
      if (qualityState === 1 || qualityState === 2) btn.classList.add('active');
      else btn.classList.remove('active');
    }

    // ─── CHAT HELPERS ───

    function scrollFeedToBottom() {
      const feed = document.getElementById('chat-feed');
      feed.scrollTop = feed.scrollHeight;
    }

    function appendUserMessage(text) {
      const feed = document.getElementById('chat-feed');
      const div = document.createElement('div');
      div.className = 'msg-user';
      div.innerHTML = `
        <div class="msg-user-wrap">
          <div class="msg-user-bubble">${escapeHtml(text)}</div>
          <button class="msg-copy-btn" title="Copy prompt">
            <svg class="copy-icon" width="13" height="13" viewBox="0 0 15 15" fill="none">
              <rect x="4" y="4" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
              <path d="M3 11V3a1 1 0 0 1 1-1h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <svg class="copy-check" width="13" height="13" viewBox="0 0 15 15" fill="none">
              <path d="M2.5 7.5L6 11L12.5 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>`;
      const copyBtn = div.querySelector('.msg-copy-btn');
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(text || '').then(() => {
          copyBtn.classList.add('copied');
          setTimeout(() => copyBtn.classList.remove('copied'), 2000);
        });
      });
      feed.appendChild(div);
      scrollFeedToBottom();
    }

    function appendSkeletonLoader(aspectClass) {
      const feed = document.getElementById('chat-feed');
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-ai';
      wrapper.id = 'skeleton-latest';

      wrapper.innerHTML = `
        <div class="msg-ai-inner">
          <div class="img-skeleton ${aspectClass}"></div>
        </div>
      `;
      feed.appendChild(wrapper);
      scrollFeedToBottom();
      return wrapper;
    }

    function replaceSkeleton(skeletonEl, tokens, qualityLabel, aspectClass, promptText) {
      const feed = document.getElementById('chat-feed');
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-ai';

      wrapper.innerHTML = `
        <div class="msg-ai-inner">
          <div class="img-placeholder ${aspectClass}" title="Click to expand">
            <div class="img-placeholder-bg"></div>
            <div class="img-placeholder-content">
              <span class="img-placeholder-icon">✦</span>
              <div class="img-placeholder-label">${qualityLabel} · Generated</div>
              <div class="img-placeholder-tokens">${tokens} tokens</div>
            </div>
          </div>
          <div class="img-actions">
            <button class="img-action-btn" title="Download image">
              <svg class="dl-icon" width="14" height="14" viewBox="0 0 15 15" fill="none">
                <path d="M7.5 2v8M7.5 10L4 6.5M7.5 10L11 6.5M2 13h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      `;

      const ph = wrapper.querySelector('.img-placeholder');
      ph.addEventListener('click', () => openLightbox(qualityLabel, tokens, aspectClass));

      // Download button
      const dlBtn = wrapper.querySelector('.img-action-btn:first-child');
      dlBtn.addEventListener('click', () => downloadFromCard(qualityLabel, tokens, aspectClass));

      feed.replaceChild(wrapper, skeletonEl);
      scrollFeedToBottom();
    }

    function downloadFromCard(qualityLabel, tokens, aspectClass) {
      const dims = aspectDims[aspectClass] || aspectDims.sq;
      const w = dims.w, h = dims.h;
      const canvas = document.createElement('canvas');
      canvas.width = w * 2; canvas.height = h * 2;
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2);
      const grd = ctx.createLinearGradient(0, 0, w, h);
      grd.addColorStop(0,   '#1e1e23');
      grd.addColorStop(0.5, '#28263a');
      grd.addColorStop(1,   '#1c1e28');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);
      const fontSize = Math.max(14, Math.round(w * 0.04));
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font = `600 ${fontSize}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(qualityLabel + ' · Generated', w/2, h/2 - fontSize * 0.6);
      ctx.fillStyle = '#e879f9';
      ctx.font = `500 ${Math.round(fontSize * 0.95)}px Inter, sans-serif`;
      ctx.fillText(tokens + ' tokens', w/2, h/2 + fontSize * 1.2);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'imagine-' + Date.now() + '.png';
      a.click();
    }

    // ─── LIGHTBOX ───
    const aspectDims = {
      sq:    { w: 560, h: 560 },
      vert:  { w: 360, h: 640 },
      horiz: { w: 640, h: 360 }
    };

    function openLightbox(label, tokens, aspectClass) {
      const lb = document.getElementById('lightbox');
      const ph = document.getElementById('lightbox-placeholder');

      const base = aspectDims[aspectClass] || aspectDims.sq;
      const ratio = base.w / base.h;

      const vw = window.innerWidth;
      const vh = window.innerHeight;

      let w, h;
      if (vw / vh > ratio) {
        // screen is wider than image ratio — fit by height
        h = vh;
        w = vh * ratio;
      } else {
        // screen is taller — fit by width
        w = vw;
        h = vw / ratio;
      }

      ph.style.width  = Math.round(w) + 'px';
      ph.style.height = Math.round(h) + 'px';
      ph.style.borderRadius = '0';

      document.getElementById('lb-label').textContent  = label + ' · Generated';
      document.getElementById('lb-tokens').textContent = tokens + ' tokens';

      lb.classList.add('open');
      document.addEventListener('keydown', lbKeyHandler);
    }

    function handleLightboxClick(e) {
      if (e.target.closest('#lb-close-btn')) return;
      closeLightbox();
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lb-close-btn').classList.remove('visible');
      document.removeEventListener('keydown', lbKeyHandler);
    }

    function lbKeyHandler(e) {
      if (e.key === 'Escape') closeLightbox();
    }

    function downloadPlaceholder() {
      const ph = document.getElementById('lightbox-placeholder');
      const w = ph.offsetWidth, h = ph.offsetHeight;
      const canvas = document.createElement('canvas');
      canvas.width = w * 2; canvas.height = h * 2;
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2);
      const grd = ctx.createLinearGradient(0, 0, w, h);
      grd.addColorStop(0,   '#1e1e23');
      grd.addColorStop(0.5, '#28263a');
      grd.addColorStop(1,   '#1c1e28');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, w, h);
      const fontSize = Math.max(14, Math.round(w * 0.04));
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font = `600 ${fontSize}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(document.getElementById('lb-label').textContent, w/2, h/2 - fontSize * 0.6);
      ctx.fillStyle = '#e879f9';
      ctx.font = `500 ${Math.round(fontSize * 0.95)}px Inter, sans-serif`;
      ctx.fillText(document.getElementById('lb-tokens').textContent, w/2, h/2 + fontSize * 1.2);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'imagine-' + Date.now() + '.png';
      a.click();
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(text));
      return d.innerHTML;
    }

    // ─── ATTACHMENTS ───
    let attachedFiles = []; // [{dataUrl, mimeType}]

    function handleFileInput(e) {
      const files = Array.from(e.target.files);
      e.target.value = '';
      const remaining = 4 - attachedFiles.length;
      const toAdd = files.slice(0, remaining);
      toAdd.forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          const dataUrl = ev.target.result;
          const mimeType = file.type || 'image/jpeg';
          attachedFiles.push({ dataUrl, mimeType });
          renderAttachments();
        };
        reader.readAsDataURL(file);
      });
      if (files.length > remaining) showError('Maximum 4 images allowed.');
    }

    function removeAttachment(index) {
      attachedFiles.splice(index, 1);
      renderAttachments();
    }

    function renderAttachments() {
      const row = document.getElementById('attachmentsRow');
      row.innerHTML = '';
      attachedFiles.forEach((f, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'attachment-thumb';
        thumb.innerHTML = `
          <img src="${f.dataUrl}" alt="attachment"/>
          <button class="attachment-remove" title="Remove" onclick="removeAttachment(${i})">
            <svg width="8" height="8" viewBox="0 0 10 10" fill="none">
              <path d="M1 1L9 9M9 1L1 9" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        `;
        row.appendChild(thumb);
      });
      row.classList.toggle('has-files', attachedFiles.length > 0);
    }

    // ─── API MODE ───
    let apiMode = false;

    // quality state → OpenRouter image_size
    const qualitySizeMap = ['1K', '2K', '4K'];

    // aspect index → OpenRouter aspect_ratio
    const aspectRatioMap = ['1:1', '9:16', '16:9'];

    const OR_KEY = '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';

    function toggleApiMode() {
      apiMode = !apiMode;
      document.getElementById('apiModeBtn').classList.toggle('active', apiMode);
    }

    // ─── MAIN GENERATE ───

    async function generate() {
      const promptEl = document.getElementById('prompt');
      const prompt = promptEl.value.trim();
      if (!prompt) { showError('Please enter a prompt.'); return; }

      document.getElementById('main').classList.add('has-image');
      appendUserMessage(prompt);
      const savedPrompt = prompt;
      const savedFiles = [...attachedFiles];

      // Clear input and attachments
      promptEl.value = '';
      attachedFiles = [];
      renderAttachments();

      setSending(true);

      const aspect = aspectClasses[aspectIndex];
      const skeletonEl = appendSkeletonLoader(aspect);

      if (apiMode) {
        // ── REAL API GENERATION ──
        const apiKey = OR_KEY;

        try {
          // Build message content — text + optional images
          let userContent;
          if (savedFiles.length > 0) {
            userContent = [
              { type: 'text', text: savedPrompt },
              ...savedFiles.map(f => ({
                type: 'image_url',
                image_url: { url: f.dataUrl }
              }))
            ];
          } else {
            userContent = savedPrompt;
          }

          const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${apiKey}`,
              'Content-Type': 'application/json',
              'HTTP-Referer': window.location.href,
              'X-Title': 'Imagine'
            },
            body: JSON.stringify({
              model: 'google/gemini-3.1-flash-image-preview',
              messages: [{ role: 'user', content: userContent }],
              modalities: ['image', 'text'],
              image_config: {
                aspect_ratio: aspectRatioMap[aspectIndex],
                image_size: qualitySizeMap[qualityState]
              }
            })
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err?.error?.message || `HTTP ${response.status}`);
          }

          const data = await response.json();
          const message = data?.choices?.[0]?.message;
          const imageUrl = message?.images?.[0]?.image_url?.url
                        || message?.images?.[0]?.imageUrl?.url;

          if (!imageUrl) throw new Error('No image in response');

          const label = qualityNames[qualityState];
          const tokens = data?.usage?.total_tokens || 0;
          replaceSkeletonReal(skeletonEl, imageUrl, label, tokens, aspect);
          updateTokenUI(tokens);

        } catch (e) {
          showError('Generation failed: ' + e.message);
          feed_removeEl(skeletonEl);
        }

      } else {
        // ── MOCK GENERATION ──
        const [dMin, dMax] = delayRanges[qualityState];
        const delay = randInt(dMin, dMax);
        const [tMin, tMax] = tokenRanges[qualityState];
        const tokens = randInt(tMin, tMax);
        const label = qualityNames[qualityState];

        await new Promise(resolve => setTimeout(resolve, delay));

        replaceSkeleton(skeletonEl, tokens, label, aspect, savedPrompt);
        updateTokenUI(tokens);
      }

      setSending(false);
    }

    function feed_removeEl(el) {
      try { document.getElementById('chat-feed').removeChild(el); } catch(_) {}
    }

    // Replace skeleton with REAL image
    function replaceSkeletonReal(skeletonEl, imageUrl, qualityLabel, tokens, aspectClass) {
      const feed = document.getElementById('chat-feed');
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-ai';

      wrapper.innerHTML = `
        <div class="msg-ai-inner">
          <img class="img-real ${aspectClass}" src="${imageUrl}" alt="Generated image" title="Click to expand" />
          <div class="img-actions">
            <button class="img-action-btn dl-real-btn" title="Download image">
              <svg class="dl-icon" width="14" height="14" viewBox="0 0 15 15" fill="none">
                <path d="M7.5 2v8M7.5 10L4 6.5M7.5 10L11 6.5M2 13h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      `;

      const img = wrapper.querySelector('.img-real');
      img.addEventListener('click', () => openLightboxReal(imageUrl, qualityLabel, tokens, aspectClass));

      const dlBtn = wrapper.querySelector('.dl-real-btn');
      dlBtn.addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = imageUrl;
        a.download = 'imagine-' + Date.now() + '.png';
        a.click();
      });

      feed.replaceChild(wrapper, skeletonEl);
      scrollFeedToBottom();
    }

    // Lightbox for real image
    function openLightboxReal(imageUrl, label, tokens, aspectClass) {
      const lb = document.getElementById('lightbox');
      const ph = document.getElementById('lightbox-placeholder');

      // Replace placeholder content with actual img
      ph.innerHTML = `<img src="${imageUrl}" style="width:100%;height:100%;object-fit:contain;display:block;" alt="Generated image"/>`;
      ph.style.background = 'transparent';

      const base = aspectDims[aspectClass] || aspectDims.sq;
      const ratio = base.w / base.h;
      const vw = window.innerWidth, vh = window.innerHeight;
      let w, h;
      if (vw / vh > ratio) { h = vh; w = vh * ratio; }
      else { w = vw; h = vw / ratio; }

      ph.style.width  = Math.round(w) + 'px';
      ph.style.height = Math.round(h) + 'px';
      ph.style.borderRadius = '0';

      lb.classList.add('open');
      document.addEventListener('keydown', lbKeyHandler);
    }

    // ─── CUSTOM FIXED SCROLLBAR ───
    (function() {
      const scroller = document.getElementById('main');
      const feed     = document.getElementById('chat-feed');
      const bar      = document.getElementById('feed-scrollbar');
      const thumb    = document.getElementById('feed-scrollbar-thumb');

      function updateThumb() {
        const scrollH = scroller.scrollHeight;
        const clientH = scroller.clientHeight;
        if (scrollH <= clientH) {
          bar.classList.remove('visible');
          return;
        }
        bar.classList.add('visible');

        const winH = window.innerHeight;
        const thumbH = Math.max(36, (clientH / scrollH) * winH);
        const maxTop = winH - thumbH;
        const scrollRatio = scroller.scrollTop / (scrollH - clientH);
        const top = scrollRatio * maxTop;

        thumb.style.height = thumbH + 'px';
        thumb.style.top = top + 'px';
      }

      feed.addEventListener('scroll', updateThumb);
      window.addEventListener('resize', updateThumb);

      // Update whenever content changes (MutationObserver)
      new MutationObserver(updateThumb).observe(feed, { childList: true, subtree: true });

      // Drag support
      let dragging = false, startY = 0, startScroll = 0;
      thumb.addEventListener('mousedown', e => {
        dragging = true;
        startY = e.clientY;
        startScroll = feed.scrollTop;
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const winH = window.innerHeight;
        const thumbH = thumb.offsetHeight;
        const maxTop = winH - thumbH;
        const dy = e.clientY - startY;
        const ratio = dy / maxTop;
        feed.scrollTop = startScroll + ratio * (feed.scrollHeight - feed.clientHeight);
      });
      document.addEventListener('mouseup', () => { dragging = false; });
    })();
  </script>
</body>
